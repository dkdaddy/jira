dashboards:
  - id: "all-issues"
    title: "All Issues"
    view: "flat"
    baseFilter: ""
    filterWidgets:
      - project
      - status
      - priority
      - initiative
      - team
      - assignee
      - quarter
    columns:
      - key
      - summary
      - type
      - status
      - initiative
      - priority
      - assignee
      - team
      - estimate
      - quarter
      - startDate
      - dueDate
      - healthStatus

  - id: "ideation"
    title: "Ideation"
    view: "flat"
    baseFilter: "status IN (\"Ideation\", \"Discovery\") AND type IN (\"Story\", \"Epic\")"
    filterWidgets:
      - project
      - priority
      - team
      - quarter
      - assignee
    columns:
      - key
      - summary
      - priority
      - team
      - quarter
      - startDate
      - assignee
      - healthStatus

  - id: "by-team"
