    view: "org"
    baseFilter: ""
    filterWidgets:
      - project
      - status
      - priority
      - quarter
      - assignee
    columns:
      - key
      - summary
      - type
      - status
      - priority
      - assignee
      - estimate
      - quarter
      - healthStatus

  - id: "by-initiative"
