<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jira DIY Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <div class="header-content">
        <h1>Jira DIY Dashboard</h1>
        <div class="header-meta">
          <span id="sync-indicator"></span>
          <button id="btn-sync" type="button">Sync from Jira</button>
        </div>
      </div>
      <div id="header-stats" class="header-stats"></div>
    </header>

    <nav id="tab-bar"></nav>

    <main class="container">
      <div id="error-banner" class="error-banner hidden"></div>

      <section id="filter-bar" class="filter-bar"></section>

      <section id="toolbar" class="toolbar">
        <input id="search-input" type="text" placeholder="Search by key or summary..." />
        <button id="btn-clear" type="button">Clear</button>
        <button id="btn-export-csv" type="button">Export CSV</button>
        <button id="btn-export-json" type="button">Export JSON</button>
      </section>

      <section id="content-area"></section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
